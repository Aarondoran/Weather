<!DOCTYPE html>
<html>
<head>
    <title>Weather App CBA</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #333; padding: 2rem; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Weather Search</h2>
        <input type="text" id="cityInput" placeholder="Enter City (e.g. Dublin)">
        <button onclick="getWeather()">Search</button>
        <div id="result">
            <h1 id="temp">--°C</h1>
            <p id="desc">Enter a city to start</p>
        </div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const res = await fetch(`/api/weather?city=${city}`);
            const data = await res.json();

            if (data.error) {
                document.getElementById('desc').innerText = "Error: " + data.error;
            } else {
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('desc').innerText = data.weather[0].description;
            }
        }
    </script>
</body>
</html>
